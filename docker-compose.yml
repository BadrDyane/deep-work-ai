version: "3.8"

services:
  db:
    image: postgres:15
    container_name: deepwork_db
    environment:
      POSTGRES_USER: deepwork_user
      POSTGRES_PASSWORD: deepwork_pass
      POSTGRES_DB: deepwork_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: